server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(jpg|jpeg|png|gif|svg|webp|mp4|webm|woff|woff2|ttf|otf|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
